<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Domain · 문의 목록</title>

<style>
table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
}

.checked {
  color: green;
  font-weight: bold;
}

.unchecked {
  color: red;
  font-weight: bold;
}
</style>

</head>
<body>

<h2>문의 관리</h2>

<table>
<thead>
<tr>
  <th>ID</th>
  <th>이름</th>
  <th>이메일</th>
  <th>내용</th>
  <th>작성일</th>
  <th>상태</th>
  <th>작업</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script>
const ADMIN_KEY = "test_key";

async function loadList() {

  const res = await fetch("https://domain-nexon-ocid-d28a.azmoth01.workers.dev/contact/list", {
    headers: {
      "Authorization": `Bearer ${ADMIN_KEY}`
    }
  });

  const data = await res.json();
  const tbody = document.getElementById("tbody");

  tbody.innerHTML = "";

  data.forEach(row => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.id}</td>
      <td>${escapeHtml(row.name)}</td>
      <td>${escapeHtml(row.email)}</td>
      <td>${escapeHtml(row.message)}</td>
      <td>${row.created_at}</td>
      <td class="${row.checked ? 'checked' : 'unchecked'}">
        ${row.checked ? '확인됨' : '미확인'}
      </td>
      <td>
        ${row.checked ? '' :
          `<button onclick="checkInquiry(${row.id})">
            확인
          </button>`
        }
      </td>
    `;

    tbody.appendChild(tr);
  });
}

async function checkInquiry(id) {

  await fetch("https://domain-nexon-ocid-d28a.azmoth01.workers.dev/contact/check", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${ADMIN_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id })
  });

  loadList();
}

function escapeHtml(text) {
  return text
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

loadList();

</script>

</body>
</html>
